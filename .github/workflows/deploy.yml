name: CI/CD - Build & Deploy to Portainer

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deployment environment"
        type: choice
        options:
          - staging
          - production
        default: staging
      stack_name_override:
        description: "Optional Portainer stack name override"
        type: string
        default: ""
      force_deploy:
        description: "Force redeploy even if nothing changed"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/roketag33/dofus-like-api
  WEB_IMAGE: ghcr.io/roketag33/dofus-like-web

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: roketag33
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Resolve image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          publish_latest=false

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            publish_latest=true
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.deploy_target }}" == "production" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            publish_latest=true
          fi

          {
            echo "api_tags<<EOF"
            if [[ "$publish_latest" == "true" ]]; then
              echo "${{ env.API_IMAGE }}:latest"
            fi
            echo "${{ env.API_IMAGE }}:${{ github.sha }}"
            echo "EOF"
            echo "web_tags<<EOF"
            if [[ "$publish_latest" == "true" ]]; then
              echo "${{ env.WEB_IMAGE }}:latest"
            fi
            echo "${{ env.WEB_IMAGE }}:${{ github.sha }}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.api_tags }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & Push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.web_tags }}
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    name: Deploy to Portainer
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy stack via Portainer API
        shell: bash
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_STACK_NAME: ${{ secrets.PORTAINER_STACK_NAME }}
          PORTAINER_STACK_NAME_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.stack_name_override || '' }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          IMAGE_TAG: ${{ github.sha }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || 'production' }}
        run: |
          set -euo pipefail

          if [[ -n "${PORTAINER_STACK_NAME_OVERRIDE}" ]]; then
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME_OVERRIDE}"
          elif [[ "${DEPLOY_TARGET}" == "staging" ]]; then
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME}-staging"
          else
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME}"
          fi

          STACK_CONTAINER_PREFIX=$(echo "${TARGET_STACK_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          TRAEFIK_ROUTER_PREFIX="${STACK_CONTAINER_PREFIX}"
          APP_NETWORK_NAME="${STACK_CONTAINER_PREFIX}-network"

          if [[ "${DEPLOY_TARGET}" == "staging" ]]; then
            API_HOST="${STACK_CONTAINER_PREFIX}-api.roketlab.duckdns.org"
            WEB_HOST="${STACK_CONTAINER_PREFIX}.roketlab.duckdns.org"
          else
            API_HOST="dofus-like-api.roketlab.duckdns.org"
            WEB_HOST="dofus-like.roketlab.duckdns.org"
          fi

          FRONTEND_URL="https://${WEB_HOST}"
          COMPOSE_CONTENT=$(cat docker-compose.portainer.yml)

          ENV_VARS=$(jq -n \
            --arg image_tag "$IMAGE_TAG" \
            --arg jwt_secret "$JWT_SECRET" \
            --arg postgres_password "$POSTGRES_PASSWORD" \
            --arg stack_container_prefix "$STACK_CONTAINER_PREFIX" \
            --arg traefik_router_prefix "$TRAEFIK_ROUTER_PREFIX" \
            --arg api_host "$API_HOST" \
            --arg web_host "$WEB_HOST" \
            --arg app_network_name "$APP_NETWORK_NAME" \
            --arg frontend_url "$FRONTEND_URL" \
            '[
              {name: "IMAGE_TAG", value: $image_tag},
              {name: "JWT_SECRET", value: $jwt_secret},
              {name: "JWT_EXPIRES_IN", value: "7d"},
              {name: "POSTGRES_PASSWORD", value: $postgres_password},
              {name: "STACK_CONTAINER_PREFIX", value: $stack_container_prefix},
              {name: "TRAEFIK_ROUTER_PREFIX", value: $traefik_router_prefix},
              {name: "API_HOST", value: $api_host},
              {name: "WEB_HOST", value: $web_host},
              {name: "APP_NETWORK_NAME", value: $app_network_name},
              {name: "FRONTEND_URL", value: $frontend_url}
            ]')

          portainer_request() {
            local method="$1"
            local url="$2"
            local payload="$3"
            local response_file
            response_file=$(mktemp)

            local http_code
            http_code=$(curl --silent --show-error -L -X "$method" \
              --insecure \
              -H "X-API-Key: ${PORTAINER_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -o "$response_file" \
              -w '%{http_code}' \
              "$url" \
              -d "$payload")

            if [[ "$http_code" =~ ^2 ]]; then
              jq '{Id, Name, Status}' "$response_file"
              rm -f "$response_file"
              return 0
            fi

            echo "Portainer API error (${http_code})"
            cat "$response_file"
            rm -f "$response_file"
            return 1
          }

          echo "Fetching stack list from Portainer..."
          STACKS=$(curl -fsSL \
            --insecure \
            -H "X-API-Key: ${PORTAINER_API_TOKEN}" \
            "${PORTAINER_URL}/api/stacks")

          STACK_ID=$(echo "$STACKS" | jq -r --arg name "$TARGET_STACK_NAME" \
            '.[] | select(.Name == $name) | .Id')

          if [[ -z "$STACK_ID" || "$STACK_ID" == "null" ]]; then
            echo "Stack '${TARGET_STACK_NAME}' not found, creating..."

            PAYLOAD=$(jq -n \
              --arg name "$TARGET_STACK_NAME" \
              --arg content "$COMPOSE_CONTENT" \
              --argjson env "$ENV_VARS" \
              '{name: $name, stackFileContent: $content, env: $env}')

            portainer_request \
              POST \
              "${PORTAINER_URL}/api/stacks/create/standalone/string?endpointId=${PORTAINER_ENDPOINT_ID}" \
              "$PAYLOAD"
          else
            echo "Stack found (ID: $STACK_ID), updating..."

            PAYLOAD=$(jq -n \
              --arg content "$COMPOSE_CONTENT" \
              --argjson env "$ENV_VARS" \
              '{stackFileContent: $content, pullImage: true, prune: false, env: $env}')

            portainer_request \
              PUT \
              "${PORTAINER_URL}/api/stacks/${STACK_ID}?endpointId=${PORTAINER_ENDPOINT_ID}" \
              "$PAYLOAD"
          fi

      - name: Deployment summary
        if: always()
        shell: bash
        env:
          PORTAINER_STACK_NAME: ${{ secrets.PORTAINER_STACK_NAME }}
          PORTAINER_STACK_NAME_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.stack_name_override || '' }}
          DEPLOY_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_target || 'production' }}
        run: |
          if [[ -n "${PORTAINER_STACK_NAME_OVERRIDE}" ]]; then
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME_OVERRIDE}"
          elif [[ "${DEPLOY_TARGET}" == "staging" ]]; then
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME}-staging"
          else
            TARGET_STACK_NAME="${PORTAINER_STACK_NAME}"
          fi

          STACK_CONTAINER_PREFIX=$(echo "${TARGET_STACK_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')

          if [[ "${DEPLOY_TARGET}" == "staging" ]]; then
            API_HOST="${STACK_CONTAINER_PREFIX}-api.roketlab.duckdns.org"
            WEB_HOST="${STACK_CONTAINER_PREFIX}.roketlab.duckdns.org"
          else
            API_HOST="dofus-like-api.roketlab.duckdns.org"
            WEB_HOST="dofus-like.roketlab.duckdns.org"
          fi

          echo "Commit  : ${{ github.sha }}"
          echo "Branch  : ${{ github.ref_name }}"
          echo "Target  : ${DEPLOY_TARGET}"
          echo "Stack   : ${TARGET_STACK_NAME}"
          echo "API     : ${{ env.API_IMAGE }}:${{ github.sha }}"
          echo "Web     : ${{ env.WEB_IMAGE }}:${{ github.sha }}"
          echo "URL API : https://${API_HOST}"
          echo "URL Web : https://${WEB_HOST}"
